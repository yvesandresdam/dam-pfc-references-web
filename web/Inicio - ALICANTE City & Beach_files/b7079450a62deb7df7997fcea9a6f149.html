		<script type="text/javascript">
			var ElTiempoWidget = {
			init: function() {
				this.fix_links();
			}, 

			fix_links: function () {
				var widget	= document.getElementById('widget');
				var href	=  document.getElementById('widget-to').href; 
				var form	= widget.getElementsByTagName('form');
				var as		= widget.getElementsByTagName('a');
				var trs		= widget.getElementsByTagName('tr');
				var i		= 0;

				if (form.length) {
					form[0].setAttribute('target', '_blank');
				}

				var open_new_window = function (e) {
					if (!e) {
						e = window.event;
					}
					var target;
					if (e.target) {
						target = e.target;
					} else if (e.srcElement) {
						target = e.srcElement;
					}
					if (target && target.nodeName !== "INPUT") {
						window.open(href);

						if (e.cancelBubble) {
							e.cancelBubble = true;
							e.returnValue = false;
						} else if (e.stopPropagation) {
							e.stopPropagation();
							e.preventDefault();
						}

						return false;
					}
				};

				for (i = 0; trs[i]; i++) {
					if (trs[i].className.indexOf('foot') === -1 && trs[i].className.indexOf('head') === -1) {
						trs[i].style.cursor = 'pointer';
						trs[i].onclick = open_new_window;
					}
				}

				for (i = 0; as[i]; i++) {
					as[i].onclick = open_new_window;
				}
			}
		};
		</script>
		<script type="text/javascript">
			ElTiempoWidget.init();
		</script>
